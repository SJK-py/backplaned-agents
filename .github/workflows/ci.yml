name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ruff + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # One Postgres backs both schemas; the two databases (router + suite) are
    # created in a step below. Tests use fakeredis and the in-process session
    # lock, so no Redis service is required.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Router alembic env + router integration tests (TEST_DB_URL).
      ROUTER_DB_URL: postgresql://postgres:postgres@localhost:5432/router_test
      TEST_DB_URL: postgresql://postgres:postgres@localhost:5432/router_test
      # Suite alembic env + suite DB tests.
      SUITE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/suite_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (all extras the test suite exercises)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[router,suite,admin,webapp,llm-gemini,dev]"

      - name: Create test databases
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres \
            -c "CREATE DATABASE router_test;"
          PGPASSWORD=postgres psql -h localhost -U postgres \
            -c "CREATE DATABASE suite_test;"

      - name: Apply migrations (both schemas)
        run: |
          alembic -c alembic.ini upgrade head
          alembic -c alembic_suite.ini upgrade head

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest -q
