# Alembic config for the bp_router database migrations.
#
# The DB URL is NOT stored here — `env.py` reads it from the
# `ROUTER_DB_URL` environment variable (keeps secrets out of the
# repo). Run with: `alembic -c alembic.ini upgrade head`.
#
# `sqlalchemy.url` is intentionally left blank below; env.py sets it
# from ROUTER_DB_URL (and coerces postgresql:// → postgresql+asyncpg://).

[alembic]
script_location = bp_router/db/migrations
sqlalchemy.url =

[loggers]
keys = root,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
