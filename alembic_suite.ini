# Alembic config for the AGENT SUITE's Postgres (bp_agents), separate
# from the router's `alembic.ini`. The suite keeps its own database.
#
#   export SUITE_DATABASE_URL=postgresql://postgres:bp@localhost:5432/bp_suite
#   alembic -c alembic_suite.ini upgrade head

[alembic]
script_location = bp_agents/migrations
prepend_sys_path = .
version_path_separator = os
# Overridden from SUITE_DATABASE_URL in env.py so secrets stay out of
# this file. The placeholder must be a valid URL shape for Alembic.
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
