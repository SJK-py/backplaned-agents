{# Renders an invitation status as a coloured badge. Pass `value`. #}
{% set classes = {
    "valid":   "bg-emerald-100 text-emerald-800 ring-emerald-600/20",
    "used":    "bg-blue-100 text-blue-800 ring-blue-600/20",
    "expired": "bg-slate-100 text-slate-700 ring-slate-600/20",
} %}
<span class="inline-flex items-center rounded-md px-2 py-0.5 text-xs font-medium
             ring-1 ring-inset
             {{ classes.get(value, 'bg-slate-100 text-slate-700 ring-slate-600/20') }}">
  {{ value }}
</span>
