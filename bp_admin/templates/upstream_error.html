{% extends "base.html" %}
{% block title %}Upstream error — bp_admin{% endblock %}

{% block content %}
<header class="mb-6">
  <h1 class="text-2xl font-semibold text-brand-900">Upstream error</h1>
  <p class="text-sm text-brand-500 mt-1">
    The router returned a non-success response. Details below.
  </p>
</header>

<section class="bg-white border border-red-200 rounded-md p-5 shadow-sm">
  <div class="text-sm">
    <span class="inline-flex items-center rounded-md bg-red-100 px-2 py-0.5
                 text-xs font-medium text-red-800 ring-1 ring-inset ring-red-600/20">
      {{ status_code }}
    </span>
    <p class="mt-3 text-brand-900">{{ message }}</p>
  </div>
</section>

<div class="mt-6 flex items-center gap-4">
  <button type="button" onclick="history.back()"
          class="text-sm text-brand-700 hover:text-brand-900 underline underline-offset-2">
    ← Go back
  </button>
  <a href="/admin/"
     class="text-sm text-brand-500 hover:text-brand-900 underline underline-offset-2">
    Dashboard
  </a>
</div>
{% endblock %}
