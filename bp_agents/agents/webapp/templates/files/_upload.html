{# Upload form. Needs `session_id`, `scope` (session|persist), `label`.
   Multipart; HTMX adds the X-CSRF-Token header (the middleware doesn't
   parse a csrf field out of multipart bodies). #}
<form hx-post="/files/{{ session_id }}" hx-encoding="multipart/form-data"
      class="flex flex-wrap items-center gap-2">
  {% include "_partials/csrf.html" %}
  <input type="hidden" name="scope" value="{{ scope }}" />
  <input type="file" name="file" required
         class="text-sm text-brand-700 file:mr-2 file:rounded file:border-0
                file:bg-brand-900 file:px-3 file:py-1 file:text-white" />
  <button type="submit"
          class="rounded bg-brand-900 px-3 py-1.5 text-sm font-medium text-white hover:bg-brand-700">
    {{ label }}
  </button>
</form>
