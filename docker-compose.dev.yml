# Local-development external dependencies for the router + agent suite.
#
# Brings up Postgres (with BOTH databases — `bp_router` and `bp_suite`).
# Everything else is opt-in via a profile — single-worker dev runs fine
# without them:
#   --profile valkey  Valkey (else the router uses its per-process fallback
#                     for JWT revocation + rate-limit quotas — fine single-worker)
#   --profile search  SearXNG for the research agent's web search
#   --profile s3      SeaweedFS (S3) to exercise the non-local file store
# The router and the suite agents run from source on the host
# (scripts/dev-up.sh boots the router; scripts/run-suite.sh boots the
# agents) — this file is only the backing services.
#
# Bring up:    docker compose -f docker-compose.dev.yml up -d
#   + extras:  docker compose -f docker-compose.dev.yml --profile valkey --profile search --profile s3 up -d
# Tear down:   docker compose -f docker-compose.dev.yml down        (keep data)
#   + volumes: docker compose -f docker-compose.dev.yml down -v     (wipe data)
#
# `bp_suite` is created by deploy/postgres-init/ on FIRST init (empty
# volume). If you added the suite to an existing dev volume, run
# `down -v` once to recreate, or `createdb -U postgres -h localhost bp_suite`.
#
# This file is for developer machines and CI only — production deployments
# use docker-compose.prod.yml (managed secrets, persistent volumes, TLS).

services:
  postgres:
    image: postgres:16
    container_name: bp-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bp
      POSTGRES_DB: bp_router
    ports:
      - "5432:5432"
    volumes:
      - bp_pg_data:/var/lib/postgresql/data
      # Creates the `bp_suite` database (+ role) on first init.
      - ./deploy/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bp_router"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional. Off by default — the router falls back to per-process state
  # (correct for single-worker dev). Enable with `--profile valkey` and set
  # ROUTER_VALKEY_URL=redis://localhost:6379/0 (Valkey speaks the Redis wire
  # protocol, so the redis:// scheme is unchanged).
  valkey:
    # Valkey — the BSD-licensed, Redis-7.2-compatible fork (see prod compose).
    image: valkey/valkey:8-alpine
    container_name: bp-valkey
    profiles: ["valkey"]
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional SearXNG for the research agent (SUITE_WEB_SEARCH_BACKEND=searxng,
  # the default). Off by default; enable with `--profile search` and point
  # SUITE_SEARXNG_URL at http://localhost:8888 (or an external Brave-API-
  # compatible endpoint). For the hosted backends set SUITE_WEB_SEARCH_BACKEND
  # to brave/kagi/exa + the matching SUITE_BRAVE_API_KEY / SUITE_KAGI_API_KEY /
  # SUITE_EXA_API_KEY in .env — no extra container needed.
  searxng:
    image: searxng/searxng:latest
    container_name: bp-searxng
    profiles: ["search"]
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: http://localhost:8888/
    ports:
      - "8888:8080"

  # Optional S3-compatible object store. Off by default — dev uses the
  # router's `local` file store (no extra service). Enable with
  # `--profile s3` to exercise the S3 backend, then point the router at it:
  #   ROUTER_FILE_STORE=s3
  #   ROUTER_FILE_STORE_OPTIONS={"bucket":"bp-files","endpoint_url":"http://localhost:8333","region_name":"us-east-1","access_key_id":"devkey","secret_access_key":"devsecret"}
  # SeaweedFS — the same engine prod ships. (rustfs's beta multipart was
  # unstable: create_multipart_upload succeeded but the immediate upload_part
  # 403'd NoSuchUpload, so any upload bigger than one PUT failed.) `weed server
  # -s3` runs the whole stack in one process; the S3 API listens on :8333.
  seaweedfs:
    image: chrislusf/seaweedfs:4.29
    container_name: bp-seaweedfs
    profiles: ["s3"]
    restart: unless-stopped
    # Dev creds (devkey/devsecret) match the ROUTER_FILE_STORE_OPTIONS above.
    # SeaweedFS reads S3 identities from a JSON file, rendered here at boot.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /etc/seaweedfs
        cat > /etc/seaweedfs/s3.json <<'JSON'
        {"identities":[{"name":"router","credentials":[{"accessKey":"devkey","secretKey":"devsecret"}],"actions":["Admin"]}]}
        JSON
        exec weed server -dir=/data -s3 -s3.config=/etc/seaweedfs/s3.json
    ports:
      - "8333:8333"
    volumes:
      - bp_seaweedfs_data:/data

volumes:
  bp_pg_data:
  bp_seaweedfs_data:
