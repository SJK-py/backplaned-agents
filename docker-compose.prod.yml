  #     AGENT_STATE_DIR: /state
  #     SUITE_DB_URL: postgresql://bp_suite:${SUITE_DB_PASSWORD}@postgres:5432/bp_suite
  #     SUITE_REDIS_URL: redis://redis:6379/1
  #     TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
  #   volumes: [chatbot_state:/state]
  #   networks: [edge, agents, suite]

  # sandbox:                       # docker 6 — UNTRUSTED code execution
  #   image: ${SANDBOX_IMAGE}
  #   restart: unless-stopped
  #   depends_on: [router]
  #   environment:
  #     AGENT_ROUTER_URL: ws://router:8000/v1/agent
  #     AGENT_INVITATION_TOKEN: ${SANDBOX_INVITATION}
  #     AGENT_STATE_DIR: /state
  #   security_opt: ["no-new-privileges:true"]
  #   cap_drop: ["ALL"]
