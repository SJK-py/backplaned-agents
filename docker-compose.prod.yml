  #   # Prefer a sandboxed runtime (gVisor/Kata): runtime: runsc
  #   # Resource caps: cpus, mem_limit, pids_limit. Egress off/allowlisted.
  #   networks: [agents]           # router WS ONLY — no db/redis/s3/web

  # reasoning:                     # docker 7 — orchestrator (l0) + l1
  #   image: ${SUITE_IMAGE}        # supervisor runs orchestrator,
  #   #                            # computer_use, research, deep_reasoning
  #   #                            # — each its own process + invitation
  #   networks: [agents, suite]

  # stores:                        # knowledge_base + memory (CO-LOCATED)
  #   image: ${SUITE_IMAGE}
  #   volumes: [lancedb_data:/lancedb]    # the shared per-user LanceDB
  #   networks: [agents, suite]
