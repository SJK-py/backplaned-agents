# Backplaned production topology (skeleton).
#
# Brings up the full stack from THIS monorepo: edge proxy, router (+ a
# one-shot `migrate`), Postgres (router + suite DBs), Valkey, SeaweedFS (S3),
# and the AGENT SUITE (chatbot, webapp, sandbox, orchestrator/l1, stores,
# helpers, searxng, mcp_bridge) — all defined below and built from this repo's
# Dockerfile / Dockerfile.suite. See docs/agent-suite/deployment.md.
#
# Secrets: this skeleton reads ${VARS} from a `.env` file for brevity.
# For real deploys use Docker/host secrets (never a committed .env), and
# give each container ONLY the secrets it needs — see
# docs/backplaned/deployment.md (secret scoping). Do NOT commit real values.

name: backplaned

networks:
  edge: {}        # proxy  <-> router  (+ webapp in v2)
  backend: {}     # router <-> postgres / valkey / seaweedfs (private)
  agents: {}      # router <-> every agent (the agent WS /v1/agent)
  suite: {}       # chatbot + suite agents <-> suite Postgres / Valkey

volumes:
  pg_data: {}
  valkey_data: {}
  seaweedfs_data: {}
  caddy_data: {}
  caddy_config: {}
  lancedb_data: {}      # per-user LanceDB (knowledge + memory)
  # Per-agent /state (AGENT_STATE_DIR): each agent persists its
  # credentials.json (auth token + rotated service refresh token) here so a
  # normal restart RESUMES from the stored token (fast, no router round-trip)
  # instead of re-onboarding. If /state is lost (fresh host) or the token has
  # expired (>24h down), the agent re-onboards — which now succeeds because
  # prod.sh ships a fresh invitation each launch and the router allows
  # idempotent re-onboard. One volume per agent (state is per-identity).
  chatbot_state: {}     # chatbot credentials.json + Telegram offset
  webapp_state: {}
  orchestrator_state: {}
  deep_reasoning_state: {}
  research_state: {}
  computer_use_state: {}
  knowledge_base_state: {}
  memory_state: {}
  history_summarizer_state: {}
  md_converter_state: {}
  config_state: {}
  sandbox_state: {}
  mcp_bridge_state: {}  # bp_mcp_bridge: service_mcp token + per-server agent creds

# Common config shared by every suite agent. Each service sets
# SUITE_AGENT + its own AGENT_INVITATION_TOKEN. NOTE: no `build:` here on
# purpose — the image is built once by `suite-migrate`; every agent that
# inherits this anchor (`<<: *suite-agent`) references the tag image-only.
# Adding `build:` back would make `up --build` build backplaned-suite:latest
# from many services at once → `image ... already exists`.
#
# This is a TOP-LEVEL `x-` extension field, NOT a service. Compose resolves
# its `&suite-agent` / `&suite-env` anchors document-wide but does NOT
# instantiate `x-` keys as containers. (When this lived UNDER `services:`,
# Compose launched it as a real "x-suite-agent" container running the image
# default SUITE_AGENT=orchestrator with no invitation token → crash-loop on
# onboard. Keep it top-level.)
x-suite-agent: &suite-agent
  image: backplaned-suite:latest   # built by `suite-migrate` (one builder per tag)
  pull_policy: never               # use the locally-built tag; never pull
  restart: unless-stopped
  # SDK agents drain in-flight tasks on SIGTERM (bp_sdk graceful shutdown,
  # PR #75); give them room before SIGKILL. Inherited via `<<: *suite-agent`
  # by webapp and every suite agent below.
  stop_grace_period: 30s
  depends_on:
    router: {condition: service_started}
    suite-migrate: {condition: service_completed_successfully}
    bootstrap: {condition: service_completed_successfully}
  environment: &suite-env
    AGENT_ROUTER_URL: ws://router:8000/v1/agent
    AGENT_STATE_DIR: /state
    SUITE_DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASSWORD}@postgres:5432/bp_suite
    SUITE_LANCE_ROOT: /lancedb
    # Suite Valkey (db 1; the router uses db 0). Consumed only by the channel
    # agents (chatbot, webapp): it makes the per-session turn lock a
    # DISTRIBUTED lock so the two channels serialize turns on a shared
    # session, and it backs the KakaoTalk deadline/next-touch registry.
    # Defaults to the in-cluster valkey (on the `suite` network); the lock
    # fails open if it's unreachable. Worker agents inherit but ignore it.
    # (Valkey is Redis-wire-compatible, so the URL scheme stays redis://.)
    SUITE_REDIS_URL: ${SUITE_REDIS_URL:-redis://valkey:6379/1}
    # Per-tier preset defaults seeded into a new user's config (chatbot
    # approval). prod.sh wires these to the chosen provider's
    # aliases; empty → the seeded `default` (Gemini).
    SUITE_DEFAULT_PRESET_PRO: ${SUITE_DEFAULT_PRESET_PRO:-default}
    SUITE_DEFAULT_PRESET_BALANCED: ${SUITE_DEFAULT_PRESET_BALANCED:-default}
    SUITE_DEFAULT_PRESET_LITE: ${SUITE_DEFAULT_PRESET_LITE:-default}
    SUITE_DEFAULT_PRESET_EMBEDDING: ${SUITE_DEFAULT_PRESET_EMBEDDING:-default_embedding}
    # Per-tier USER-SELECTABLE preset allow-lists. JSON arrays of preset names a
    # user may switch their own tier to via /config or the webapp Settings page.
    # Empty (default) → that tier is system-managed: the current model is still
    # SHOWN, but not user-changeable. e.g. SUITE_SELECTABLE_PRESETS_PRO=
    # ["gpt-pro","claude-opus","gemini-pro"]. (config agent + webapp read these
    # off SuiteSettings; the embedding tier is never user-selectable.)
    SUITE_SELECTABLE_PRESETS_PRO: ${SUITE_SELECTABLE_PRESETS_PRO:-[]}
    SUITE_SELECTABLE_PRESETS_BALANCED: ${SUITE_SELECTABLE_PRESETS_BALANCED:-[]}
    SUITE_SELECTABLE_PRESETS_LITE: ${SUITE_SELECTABLE_PRESETS_LITE:-[]}
    # Vector length the knowledge_base/memory agents bake into their LanceDB
    # table schema on first write (and frozen for the volume's life). MUST match
    # the embedding preset's output dimension — 1536 for the default Gemini
    # `default_embedding` and OpenAI text-embedding-3-small. prod.sh sets it
    # from the chosen preset; the :- default keeps a bare `up` consistent.
    SUITE_EMBEDDING_DIM: ${SUITE_EMBEDDING_DIM:-1536}
  networks: [agents, suite]

services:
  # --- Edge -------------------------------------------------------------
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on: [router]
    # 80/443 front the domain identity (PUBLIC_DOMAIN + WEBAPP_DOMAIN) AND, on
    # :443, the bare-IP router (Caddy SNI-multiplexes them). WEBAPP_HTTPS_PORT
    # (default 8443) publishes the webapp's OWN https port for the bare-IP case:
    # there's no DNS for `app.<ip>`, so it gets a PORT identity
    # (https://<ip>:<port>) instead of a host one. Harmless when unused.
    ports:
      - "80:80"
      - "443:443"
      - "${WEBAPP_HTTPS_PORT:-8443}:${WEBAPP_HTTPS_PORT:-8443}"
    # The Caddyfile is GENERATED by scripts/render-caddyfile.sh (prod.sh) for the
    # chosen EDGE_MODE (domain | ip | both) and bind-mounted via
    # CADDYFILE_HOST_PATH below — it bakes in literal hosts/scheme/tls, so it
    # needs NO env interpolation. The fallback (a bare `docker compose up`
    # without prod.sh) is the committed ./deploy/Caddyfile, whose `{$VAR:def}`
    # placeholders read the env below — keep these for that path.
    environment:
      # Scheme the committed-fallback Caddyfile SERVES at the origin. `https`
      # (default) → Caddy terminates TLS. `http` → TLS terminated UPSTREAM
      # (Cloudflare Tunnel, external LB); Caddy serves plain HTTP and disables
      # automatic HTTPS. The public scheme stays https (ROUTER_PUBLIC_URL).
      EDGE_SCHEME: ${EDGE_SCHEME:-https}
      # Bare-IP https knobs for the committed-fallback Caddyfile only (the
      # GENERATED file bakes `tls internal` + `default_sni` in directly). Empty
      # unless an OLD prod.sh-built .env still sets them.
      EDGE_TLS: ${EDGE_TLS:-}
      EDGE_GLOBAL: ${EDGE_GLOBAL:-}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-localhost}
      # Webapp (browser channel) host — defaults to the `app.` subdomain.
      WEBAPP_DOMAIN: ${WEBAPP_DOMAIN:-app.${PUBLIC_DOMAIN:-localhost}}
    volumes:
      # Generated Caddyfile when prod.sh built the env; committed default otherwise.
      - ${CADDYFILE_HOST_PATH:-./deploy/Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [edge]

  # --- Data services (private; never published) -------------------------
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?set PG_PASSWORD}
      POSTGRES_DB: bp_router
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Creates the second (suite) database on first init.
      - ./deploy/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d bp_router"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [backend, suite]

  valkey:
    # Valkey — the BSD-licensed, Redis-7.2-compatible fork (Linux Foundation),
    # used instead of Redis to avoid the RSALv2/SSPL relicensing. Drop-in: same
    # RESP wire protocol + command set (EVAL/Lua, WATCH/MULTI, EXPIRE, AOF), so
    # the redis-py client and the `redis://` URL scheme are unchanged — only the
    # server binary (valkey-server) and CLI (valkey-cli) differ from Redis.
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [backend, suite]

  seaweedfs:
    # S3-compatible object store for the router's file_store=s3 backend.
    # Replaced rustfs (1.0.0-beta.6) here: that beta's multipart path was
    # broken — create_multipart_upload returned an UploadId but the immediate
    # upload_part 403'd NoSuchUpload — so any file > a single PUT failed.
    # SeaweedFS has mature, reliable S3 multipart. `weed server -s3` runs
    # master+volume+filer+S3 in one process; the S3 API listens on :8333.
    # MinIO is the other known drop-in (minio/minio, `server /data`,
    # MINIO_ROOT_USER/PASSWORD). Pinned to an immutable tag for reproducible
    # deploys — confirm the CLI/flags against upstream when bumping.
    image: chrislusf/seaweedfs:4.29
    restart: unless-stopped
    environment:
      # Same secrets prod.sh already generates. SeaweedFS takes S3 creds via a
      # JSON identities file, not env, so the entrypoint renders one from these
      # at boot. `$$` escapes compose interpolation → the shell expands the env
      # var at runtime, keeping the secrets out of the rendered command.
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /etc/seaweedfs
        cat > /etc/seaweedfs/s3.json <<JSON
        {"identities":[{"name":"router","credentials":[{"accessKey":"$$S3_ACCESS_KEY","secretKey":"$$S3_SECRET_KEY"}],"actions":["Admin"]}]}
        JSON
        exec weed server -dir=/data -s3 -s3.config=/etc/seaweedfs/s3.json
    volumes:
      # Fresh volume — the old rustfs_data is not S3-API-migratable in place and
      # held nothing portable. A from-scratch deploy starts empty here.
      - seaweedfs_data:/data
    networks: [backend]
    # Not published: the router reaches it on the backend net (S3 API on
    # :8333). Keeps downloads in router-proxy mode; only expose it behind
    # the edge proxy if you switch to 302-presigned downloads.

  # --- Router (this repo) ----------------------------------------------
  # One-shot: apply router-DB migrations before the router serves, so
  # scaling the router never races the schema (only this runs `upgrade`).
  # This is also the CANONICAL BUILDER of backplaned-router:latest — it is the
  # ONLY router-image service with a `build:` section. The other router-image
  # service (`router`) references the tag image-only. Compose builds images
  # before starting any container, so the tag exists when both start. Do NOT
  # add `build:` to a second service for the same tag: `up --build` / bake then
  # build the same tag concurrently and fail with `image ... already exists`.
  migrate:
    image: backplaned-router:latest
    build: .
    # Build locally — never try to PULL this tag. It's a local image with no
    # registry, so without this an image-only dependent racing ahead of the
    # build makes compose attempt a registry pull → "login required" against
    # Docker Hub. `build` pins it to the local build.
    pull_policy: build
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres: {condition: service_healthy}
    environment:
      ROUTER_DB_URL: postgresql://${PG_USER:-postgres}:${PG_PASSWORD}@postgres:5432/bp_router
    networks: [backend]
    restart: "no"

  router:
    image: backplaned-router:latest   # built by `migrate` (one builder per tag)
    pull_policy: never                 # use the locally-built tag; never pull
    restart: unless-stopped
    # Let the lifespan drain finish (close WS sockets 1001, cancel in-flight
    # LLM tasks to stop burning provider tokens, drain loops, close the pool)
    # before Docker SIGKILLs us. Must exceed the router's shutdown_grace_s
    # (25s — the uvicorn timeout_graceful_shutdown). Without this, Docker's
    # default 10s truncates the drain on every restart/rollout.
    stop_grace_period: 30s
    depends_on:
      postgres: {condition: service_healthy}
      valkey: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}
    environment:
      ROUTER_DEPLOYMENT_ENV: prod
      ROUTER_DB_URL: postgresql://${PG_USER:-postgres}:${PG_PASSWORD}@postgres:5432/bp_router
      # Valkey speaks the Redis wire protocol, so the URL scheme stays redis://.
      ROUTER_REDIS_URL: redis://valkey:6379/0
      # Canonical PUBLIC origin (always https). prod.sh sets ROUTER_PUBLIC_URL
      # to the domain (domain/both modes) or the bare IP (ip mode); the fallback
      # keeps an old env / bare-up working off PUBLIC_DOMAIN.
      ROUTER_PUBLIC_URL: ${ROUTER_PUBLIC_URL:-https://${PUBLIC_DOMAIN:-localhost}}
      ROUTER_JWT_SECRET: ${ROUTER_JWT_SECRET:?openssl rand -base64 32}
      ROUTER_ADMIN_SESSION_SECRET: ${ROUTER_ADMIN_SESSION_SECRET:?openssl rand -base64 32}
      ROUTER_METRICS_TOKEN: ${ROUTER_METRICS_TOKEN:?required in prod}
      # Optional operator preset overlay, merged OVER the bundled catalogue at
      # first-boot seed (custom wins on a name collision; new names added). Copy
      # deploy/presets.custom.jsonc.example → deploy/presets.custom.jsonc and
      # edit it; it's gitignored and mounted read-only below. Only consulted
      # when seeding an empty llm_presets table — after that presets are
      # admin-managed in the DB. An empty array (the example default) is a no-op.
      ROUTER_LLM_PRESET_OVERLAY_PATH: /app/deploy/presets.custom.jsonc
      ROUTER_FILE_STORE: s3
      # file_store_options is parsed as JSON (pydantic-settings).
      ROUTER_FILE_STORE_OPTIONS: >-
        {"bucket":"${S3_BUCKET:-bp-files}",
         "endpoint_url":"http://seaweedfs:8333",
         "region_name":"us-east-1",
         "access_key_id":"${S3_ACCESS_KEY}",
         "secret_access_key":"${S3_SECRET_KEY}"}
      # First-boot admin seed (idempotent; safe to leave set).
      ROUTER_BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@local.test}
      ROUTER_BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?set a strong value}
      # MCP bridge principal (service_mcp): seeds + re-arms the bridge's
      # refresh-token credential each boot. SAME value the mcp_bridge service
      # presents as BP_MCP_BRIDGE_SERVICE_SECRET. Empty → bridge not provisioned.
      ROUTER_MCP_BRIDGE_SECRET: ${MCP_BRIDGE_SECRET:-}
      # LLM provider-key secrets. Presets themselves live in the
      # llm_presets table (admin-managed via /admin); a preset's
      # api_key_ref (e.g. env://GEMINI_API_KEY) resolves to one of these.
      # prod.sh fills in whichever provider you choose; the others
      # stay empty (set one per provider you configure).
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Generic passthrough slots for custom/self-hosted providers: reference
      # them from a preset's api_key_ref (env://CUSTOM_LLM_API_KEY_1, ...). They
      # reach the container with no compose edit — just set the value in
      # deploy/.env.prod. (A keyless local endpoint needs no slot; pass an
      # inline api_key dummy on the preset instead.)
      CUSTOM_LLM_API_KEY_1: ${CUSTOM_LLM_API_KEY_1:-}
      CUSTOM_LLM_API_KEY_2: ${CUSTOM_LLM_API_KEY_2:-}
      CUSTOM_LLM_API_KEY_3: ${CUSTOM_LLM_API_KEY_3:-}
    volumes:
      # Operator preset overlay (see ROUTER_LLM_PRESET_OVERLAY_PATH above),
      # read-only. The committed deploy/presets.custom.jsonc (copied from the
      # .example) ensures the bind source exists even when unused (its default
      # is an empty array → no-op).
      - ./deploy/presets.custom.jsonc:/app/deploy/presets.custom.jsonc:ro
    networks: [edge, backend, agents]
    # Not published directly — the edge proxy fronts it.

  # ======================================================================
  # AGENT SUITE. One image (Dockerfile.suite); each service selects its
  # agent via $SUITE_AGENT and onboards with its OWN admin-issued
  # invitation (the chatbot's flagged `provisions_service_user`). NONE
  # hold provider / S3 / JWT secrets — they call ctx.llm and the router's
  # file endpoints. The suite schema is applied once by `suite-migrate`,
  # and the suite ACL rule set is applied by the `bootstrap` one-shot
  # (no separate `suite-acl` service). See docs/agent-suite/deployment.md.
  # ======================================================================

  suite-migrate:                   # one-shot: apply the suite DB schema
    # CANONICAL BUILDER of backplaned-suite:latest — the ONLY suite-image
    # service with a `build:`. `bootstrap`, the `x-suite-agent` anchor, and
    # every agent inheriting it reference the tag image-only. One builder per
    # tag avoids the `up --build` / bake `image ... already exists` race.
    image: backplaned-suite:latest
    build: {context: ., dockerfile: Dockerfile.suite}
    pull_policy: build   # build locally; never pull (see migrate's note)
    command: ["alembic", "-c", "alembic_suite.ini", "upgrade", "head"]
    depends_on:
      postgres: {condition: service_healthy}
    environment:
      SUITE_DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASSWORD}@postgres:5432/bp_suite
    networks: [backend]
    restart: "no"

  bootstrap:                       # one-shot: register invitations + apply ACL
    # Runs once the router is healthy: registers each agent's pre-supplied
    # invitation token (POST /v1/admin/invitations accepts the token) and
    # applies the suite ACL. Agents depend on this completing, so a single
    # `docker compose up -d` onboards the whole roster — no manual steps.
    image: backplaned-suite:latest   # built by `suite-migrate` (one builder per tag)
    pull_policy: never               # use the locally-built tag; never pull
    command: ["python", "-m", "bp_agents.bootstrap"]
    depends_on:
      router: {condition: service_healthy}
    environment:
      ROUTER_URL: http://router:8000
      ROUTER_BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@local.test}
      ROUTER_BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?set a strong value}
      CHATBOT_INVITATION: ${CHATBOT_INVITATION:?}
      WEBAPP_INVITATION: ${WEBAPP_INVITATION:?}
      ORCHESTRATOR_INVITATION: ${ORCHESTRATOR_INVITATION:?}
      HISTORY_SUMMARIZER_INVITATION: ${HISTORY_SUMMARIZER_INVITATION:?}
      MEMORY_INVITATION: ${MEMORY_INVITATION:?}
      KNOWLEDGE_BASE_INVITATION: ${KNOWLEDGE_BASE_INVITATION:?}
      MD_CONVERTER_INVITATION: ${MD_CONVERTER_INVITATION:?}
      CONFIG_INVITATION: ${CONFIG_INVITATION:?}
      DEEP_REASONING_INVITATION: ${DEEP_REASONING_INVITATION:?}
      RESEARCH_INVITATION: ${RESEARCH_INVITATION:?}
      COMPUTER_USE_INVITATION: ${COMPUTER_USE_INVITATION:?}
      SANDBOX_INVITATION: ${SANDBOX_INVITATION:?}
    networks: [agents]
    restart: "no"

  chatbot:                         # gateway + session manager + scheduler
    <<: *suite-agent
    environment:
      <<: *suite-env
      SUITE_AGENT: chatbot
      AGENT_INVITATION_TOKEN: ${CHATBOT_INVITATION:?provisions_service_user invite}
      SUITE_TELEGRAM_BOT_TOKEN: ${SUITE_TELEGRAM_BOT_TOKEN:-}
      # KakaoTalk channel (optional). Egress-only pull consumer behind the
      # deploy/kakao-relay Cloudflare Worker + a Cloudflare Queue. Inert
      # unless the three CF queue vars are set. Needs Redis (the
      # deadline/next-touch registry) — already provided by SUITE_REDIS_URL
      # in the suite-env anchor above.
      SUITE_KAKAO_CF_ACCOUNT_ID: ${SUITE_KAKAO_CF_ACCOUNT_ID:-}
      SUITE_KAKAO_CF_QUEUE_ID: ${SUITE_KAKAO_CF_QUEUE_ID:-}
      SUITE_KAKAO_CF_API_TOKEN: ${SUITE_KAKAO_CF_API_TOKEN:-}
      # Outbound KakaoTalk images (optional, presigned R2). Inbound images
      # reuse the router file store regardless of these.
      SUITE_KAKAO_R2_ENDPOINT_URL: ${SUITE_KAKAO_R2_ENDPOINT_URL:-}
      SUITE_KAKAO_R2_BUCKET: ${SUITE_KAKAO_R2_BUCKET:-}
      SUITE_KAKAO_R2_ACCESS_KEY_ID: ${SUITE_KAKAO_R2_ACCESS_KEY_ID:-}
      SUITE_KAKAO_R2_SECRET_ACCESS_KEY: ${SUITE_KAKAO_R2_SECRET_ACCESS_KEY:-}
    volumes: [chatbot_state:/state]
    networks: [edge, agents, suite]

  webapp:                          # browser channel (FastAPI + agent WS)
    <<: *suite-agent
    environment:
      <<: *suite-env
      SUITE_AGENT: webapp
      AGENT_INVITATION_TOKEN: ${WEBAPP_INVITATION:?}
      # Signs the browser session cookie. Generate a strong random value.
      WEBAPP_SESSION_SECRET: ${WEBAPP_SESSION_SECRET:?set a strong random value}
      WEBAPP_DEPLOYMENT_ENV: prod
      # Serve the self-hosted stylesheet (built into the image) — NOT the
      # Tailwind Play CDN. Required in prod (the config validator enforces it).
      WEBAPP_USE_BUILT_CSS: "true"
    # Fronted by the edge proxy (HTTPS + SSE); not published directly.
    networks: [edge, agents, suite]
    volumes: [webapp_state:/state]

  orchestrator:
    <<: *suite-agent
    environment:
      <<: *suite-env
      SUITE_AGENT: orchestrator
      AGENT_INVITATION_TOKEN: ${ORCHESTRATOR_INVITATION:?}
    volumes: [orchestrator_state:/state]

  deep_reasoning:
    <<: *suite-agent
    environment: {<<: *suite-env, SUITE_AGENT: deep_reasoning, AGENT_INVITATION_TOKEN: "${DEEP_REASONING_INVITATION:?}"}
    volumes: [deep_reasoning_state:/state]

  research:
    <<: *suite-agent
    environment:
      <<: *suite-env
      SUITE_AGENT: research
      AGENT_INVITATION_TOKEN: ${RESEARCH_INVITATION:?}
      # Web-search backend selector: searxng (default) | brave | kagi.
      # brave/kagi run an LLM under the hood (Brave LLM-Context / Kagi
      # FastGPT) and need their API key below; if the chosen backend's key
      # is unset the research agent falls back to SearXNG (logged).
      SUITE_WEB_SEARCH_BACKEND: ${SUITE_WEB_SEARCH_BACKEND:-searxng}
      SUITE_BRAVE_API_KEY: ${SUITE_BRAVE_API_KEY:-}
      SUITE_KAGI_API_KEY: ${SUITE_KAGI_API_KEY:-}
      # SearXNG endpoint (used when backend=searxng). The env file
      # (scripts/prod.sh) is the single source of truth: set it to the bundled
      # SearXNG (http://searxng:8080, also pass `--profile search`), an external
      # instance, or leave it EMPTY to run research with no web search.
      # Default empty — NOT http://searxng:8080 — so an unset value doesn't
      # silently point research at a SearXNG that isn't running.
      SUITE_SEARXNG_URL: ${SUITE_SEARXNG_URL:-}
    volumes: [research_state:/state]

  computer_use:
    <<: *suite-agent
    environment: {<<: *suite-env, SUITE_AGENT: computer_use, AGENT_INVITATION_TOKEN: "${COMPUTER_USE_INVITATION:?}"}
    volumes: [computer_use_state:/state]

  # knowledge_base + memory share the per-user LanceDB volume (+ own /state).
  knowledge_base:
    <<: *suite-agent
    environment: {<<: *suite-env, SUITE_AGENT: knowledge_base, AGENT_INVITATION_TOKEN: "${KNOWLEDGE_BASE_INVITATION:?}"}
    volumes: [lancedb_data:/lancedb, knowledge_base_state:/state]

  memory:
    <<: *suite-agent
    environment: {<<: *suite-env, SUITE_AGENT: memory, AGENT_INVITATION_TOKEN: "${MEMORY_INVITATION:?}"}
    volumes: [lancedb_data:/lancedb, memory_state:/state]
    # memory's per-user lock is in-process; back it with Redis to scale
    # this service beyond one replica.

  history_summarizer:
    <<: *suite-agent
    environment: {<<: *suite-env, SUITE_AGENT: history_summarizer, AGENT_INVITATION_TOKEN: "${HISTORY_SUMMARIZER_INVITATION:?}"}
    volumes: [history_summarizer_state:/state]

  md_converter:
    <<: *suite-agent
    environment: {<<: *suite-env, SUITE_AGENT: md_converter, AGENT_INVITATION_TOKEN: "${MD_CONVERTER_INVITATION:?}"}
    volumes: [md_converter_state:/state]

  config:
    <<: *suite-agent
    environment: {<<: *suite-env, SUITE_AGENT: config, AGENT_INVITATION_TOKEN: "${CONFIG_INVITATION:?}"}
    volumes: [config_state:/state]

  sandbox:                         # UNTRUSTED code execution — hardened
    <<: *suite-agent
    environment:
      <<: *suite-env
      SUITE_AGENT: sandbox
      AGENT_INVITATION_TOKEN: ${SANDBOX_INVITATION:?}
      # This service runs as root with cap_drop: ALL (below), so it has no
      # CAP_DAC_OVERRIDE and can only write a dir it OWNS. The image's default
      # /state is owned by uid 10002 → EACCES on credentials.json. Use the
      # root-owned 0700 /sandbox-state (Dockerfile.suite) instead.
      AGENT_STATE_DIR: /sandbox-state
    # Runs as ROOT (overrides the image's `USER bp`) — the ONE service that
    # legitimately needs it: per-user isolation works by dropping each user's
    # bash to a distinct uid (setgroups/setgid/setuid in the child preexec),
    # which requires CAP_SETUID, which only root has. The agent process itself
    # does nothing privileged; it drops immediately per command.
    #   * `no-new-privileges:true` is KEPT and is the crucial guard: it blocks
    #     the UNTRUSTED code from REGAINING privilege via setuid binaries
    #     (sudo/su/ping), while still allowing our root preexec to DROP
    #     (verified: no_new_privs governs execve privilege-GAIN, not setuid()
    #     down). So: root only to drop away, dropped code can't climb back.
    #   * Without root here the drop silently no-ops (`_preexec` skips it when
    #     euid != 0) and ALL users share uid 10002 — no per-user isolation.
    user: "0:0"
    security_opt: ["no-new-privileges:true"]
    # Root, but with the kernel capability set reduced to ONLY what the uid
    # drop needs: SETUID + SETGID (to drop each user's bash to its own uid) and
    # CHOWN (to hand that uid ownership of its workspace dir). Everything else
    # (NET_RAW, SYS_ADMIN, …) is dropped, so even though the process is uid 0 it
    # can't, e.g., raw-socket or mount. Notes:
    #   * cap_drop: ALL WITHOUT SETUID/SETGID would EPERM the setuid() and
    #     collapse all users onto one uid — keep them.
    #   * WITHOUT CHOWN, os.chown(workspace, uid, uid) fails with EPERM
    #     (sandbox_workspace_chown_failed): the workspace stays root-owned and,
    #     since cap_drop: ALL removed CAP_DAC_OVERRIDE, the dropped uid then
    #     can't write its own workspace — every bash command fails. CHOWN is the
    #     minimal cap that fixes it (vs re-adding the blanket DAC_OVERRIDE).
    cap_drop: ["ALL"]
    cap_add: ["SETUID", "SETGID", "CHOWN"]
    # Prefer a sandboxed runtime (gVisor/Kata): runtime: runsc. Add
    # resource caps (cpus, mem_limit, pids_limit) + egress allowlisting.
    networks: [agents]             # router WS only — no db/valkey/web
    # Mount at /sandbox-state (root-owned 0700) — see AGENT_STATE_DIR above.
    volumes: [sandbox_state:/sandbox-state]

  searxng:                         # optional web-search backend (profile)
    # Pinned to an immutable date tag (NOT `latest`) for reproducible deploys.
    image: searxng/searxng:2026.5.29-780ee3256
    restart: unless-stopped
    profiles: ["search"]
    networks: [agents]             # research queries it; it alone has web egress
    environment:
      # secret_key override (settings.yml references SEARXNG_SECRET indirectly
      # via this env). prod.sh generates SEARXNG_SECRET; the :- default keeps a
      # bare `up --profile search` working in dev. NOT `:?` — that errors even
      # when the search profile is inactive (a `none`/external-search deploy).
      SEARXNG_SECRET: ${SEARXNG_SECRET:-change-me-prod.sh-sets-SEARXNG_SECRET}
    volumes:
      # Mount our settings.yml (json format + GET method) read-only. Without it
      # the image regenerates an html-only/POST-only default every boot and
      # the research agent's `GET /search?format=json` gets 403. See the file.
      - ./deploy/searxng/settings.yml:/etc/searxng/settings.yml:ro

  mcp_bridge:                      # optional MCP bridge (profile)
    # Connects admin-configured MCP servers (admin UI → mcp_servers table) and
    # onboards one backplane agent per server (mcp_<server>, one mode per tool).
    # Runs the suite image's bp_mcp_bridge entrypoint (the package ships in the
    # wheel). Gated behind the `mcp` profile so a bare `up` (no MCP_BRIDGE_SECRET)
    # doesn't start it; prod.sh adds `--profile mcp` when the secret is set.
    image: backplaned-suite:latest   # built by `suite-migrate` (one builder per tag)
    pull_policy: never
    restart: unless-stopped
    stop_grace_period: 30s
    profiles: ["mcp"]
    depends_on:
      router: {condition: service_started}
      suite-migrate: {condition: service_completed_successfully}
      bootstrap: {condition: service_completed_successfully}
    command: ["python", "-m", "bp_mcp_bridge"]
    environment:
      BP_MCP_BRIDGE_ROUTER_URL: ws://router:8000/v1/agent
      BP_MCP_BRIDGE_ROUTER_ADMIN_URL: http://router:8000
      # The service_mcp refresh token — SAME value the router seeds as
      # ROUTER_MCP_BRIDGE_SECRET. The bridge rotates + persists it under /state.
      BP_MCP_BRIDGE_SERVICE_SECRET: ${MCP_BRIDGE_SECRET:?set MCP_BRIDGE_SECRET (prod.sh generates it)}
      # Root-owned 0700 state dir (the bridge runs as root with no DAC_OVERRIDE;
      # the 10002-owned /state would EACCES). Hides the service token + agent
      # creds from the dropped stdio subprocesses.
      BP_MCP_BRIDGE_STATE_DIR: /mcp-state
      # stdio MCP servers: each `uvx <server>` subprocess is dropped to a
      # per-server uid in this range, with a scoped env + no-new-privileges
      # (mirrors the sandbox agent). Work dirs live under /tmp so the dropped
      # uid can traverse to its own (chowned) dir; allowed launchers = uvx.
      # Range MUST stay inside 0..65535 — under Docker userns-remap/rootless the
      # container maps only a sub-range, so a higher uid fails chown (EINVAL).
      BP_MCP_BRIDGE_UID_BASE: "30000"
      BP_MCP_BRIDGE_UID_MAX: "39999"
      BP_MCP_BRIDGE_ALLOWED_LAUNCHERS: uvx
      BP_MCP_BRIDGE_STDIO_WORK_ROOT: /tmp/bp-mcp-stdio
    volumes: [mcp_bridge_state:/mcp-state]
    # Runs as ROOT with the capability set reduced to ONLY the uid-drop needs
    # (SETUID/SETGID to drop each stdio subprocess to its own uid, CHOWN to hand
    # that uid its work dir) — same model as the sandbox agent. no-new-privileges
    # blocks a dropped subprocess from regaining privilege via setuid binaries.
    # The bridge process itself does nothing privileged beyond the drop.
    user: "0:0"
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    # SETUID/SETGID + CHOWN: drop each stdio child to its own uid + own its dir.
    # KILL: root with cap_drop ALL can't signal a process it doesn't OWN (the
    # dropped child) without it — so terminate()/kill() on shutdown would EPERM.
    cap_add: ["SETUID", "SETGID", "CHOWN", "KILL"]
    # No RLIMIT_AS (Python/uvx need lots of virtual memory); bound real memory
    # here instead.
    mem_limit: 1g
    # router-only: the `agents` net carries both the per-server agents' WS
    # connections and the bridge's admin HTTP calls (same as the channel agents'
    # control-plane traffic). stdio servers via `uvx` ALSO need egress to PyPI
    # to fetch the server package — add an egress path (or pre-bake a uv cache)
    # if you use stdio servers; SSE/HTTP servers don't need it.
    networks: [agents]
