  #   # this box ever scales beyond one replica.

  # helpers:                       # config + history_summarizer + md_converter
  #   image: ${SUITE_IMAGE}
  #   networks: [agents, suite]

  # searxng:                       # docker 9 (optional) — web search backend
  #   image: searxng/searxng:latest
  #   networks: [agents]           # research queries it; it alone has web egress
